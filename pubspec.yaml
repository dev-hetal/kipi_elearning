name: kipi_elearning
description: A reusable Flutter package for e-learning course management, enrollment, and content delivery.
version: 1.0.0
homepage: https://github.com/EdzymeTech/kipi_elearning
repository: https://github.com/EdzymeTech/kipi_elearning
issue_tracker: https://github.com/EdzymeTech/kipi_elearning/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6
  
  # Pagination
  infinite_scroll_pagination: ^4.0.0
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  
  # Linting
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/json/
    - assets/svg_empty_img/
